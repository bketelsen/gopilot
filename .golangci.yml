run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - errorlint
    - gosimple
    - ineffassign
    - misspell
    - revive

linters-settings:
  errorlint:
    errorf: true
    asserts: true
    comparison: true
  revive:
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"
  staticcheck:
    checks:
      - "all"
      - "-SA1019" # deprecated API usage (nhooyr.io/websocket migration tracked separately)

issues:
  exclude-dirs:
    - test-workspaces
  exclude-generated: strict
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
