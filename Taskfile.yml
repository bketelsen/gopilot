version: '3'

vars:
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"

tasks:
  tailwindcss:
    desc: Download Tailwind CSS standalone CLI
    status:
      - test -f bin/tailwindcss
    cmds:
      - mkdir -p bin
      - curl -sLo bin/tailwindcss https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64
      - chmod +x bin/tailwindcss

  generate:
    desc: Generate templ files
    cmds:
      - go tool templ generate

  css:
    desc: Build Tailwind CSS
    deps: [tailwindcss]
    cmds:
      - bin/tailwindcss -i internal/web/static/input.css -o internal/web/static/styles.css --minify

  build:
    desc: Build the gopilot binary
    deps: [generate, css]
    cmds:
      - go build -ldflags "-X main.Version={{.VERSION}}" -o gopilot ./cmd/gopilot

  test:
    desc: Run all tests
    cmds:
      - go test -race ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f gopilot

  # GITHUB_TOKEN=$(gh auth token) ./gopilot --config gopilot.yaml --debug --port 3000 --log gopilot-local.log
  selfhost:
    desc: Build and run in self-hosted mode
    deps: [build]
    cmds:
      - GITHUB_TOKEN=$(gh auth token) ./gopilot --config gopilot.yaml --debug --port 3100 --log gopilot-local.log

  dev:
    desc: Build and run
    deps: [build]
    cmds:
      - ./gopilot {{.CLI_ARGS}}
